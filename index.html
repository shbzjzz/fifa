<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ FIFA World Cup 2026 — Live Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #080C18;
    --navy2: #0D1426;
    --panel: #111827;
    --panel2: #1A2235;
    --border: #1E2D45;
    --green: #00C853;
    --green-dim: rgba(0,200,83,0.12);
    --gold: #FFD600;
    --gold-dim: rgba(255,214,0,0.1);
    --red: #FF4444;
    --text: #E8EDF5;
    --muted: #6B7A99;
    --accent: #2563EB;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--gold); white-space: nowrap; }
  .logo span { color: var(--text); }
  .topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 24px; }
  .nav-tab { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); cursor: pointer; padding: 4px 0; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .nav-tab.active, .nav-tab:hover { color: var(--text); border-color: var(--gold); }
  .live-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse-red 1.4s infinite; }
  @keyframes pulse-red { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .refresh-btn { background: var(--panel); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
  .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

  /* MAIN LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 300px; min-width: 260px; background: var(--navy2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .match-count { font-size: 11px; color: var(--green); background: var(--green-dim); border-radius: 10px; padding: 2px 8px; font-weight: 600; }
  .filter-bar { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; }
  .filter-bar::-webkit-scrollbar { height: 0; }
  .filter-chip { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 12px; background: var(--panel); border: 1px solid var(--border); color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-chip.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .filter-chip:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .match-list { overflow-y: auto; flex: 1; }
  .match-list::-webkit-scrollbar { width: 4px; }
  .match-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .match-item { padding: 12px 14px; border-bottom: 1px solid rgba(30,45,69,0.5); cursor: pointer; transition: all 0.15s; position: relative; }
  .match-item:hover { background: var(--panel); }
  .match-item.active { background: rgba(37,99,235,0.12); border-left: 3px solid var(--accent); }
  .match-item.live-match { background: rgba(255,68,68,0.06); }
  .match-item.live-match.active { background: rgba(255,68,68,0.12); border-left-color: var(--red); }
  .match-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .match-status { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
  .status-live { background: rgba(255,68,68,0.2); color: var(--red); }
  .status-upcoming { background: rgba(37,99,235,0.15); color: #60A5FA; }
  .status-finished { background: rgba(107,122,153,0.15); color: var(--muted); }
  .match-time-label { font-size: 10px; color: var(--muted); font-weight: 500; }
  .match-round-label { font-size: 9px; color: var(--muted); margin-left: auto; text-transform: uppercase; letter-spacing: 0.5px; }
  .teams-row { display: flex; align-items: center; gap: 8px; }
  .team-entry { display: flex; align-items: center; gap: 7px; flex: 1; }
  .team-entry.away { flex-direction: row-reverse; }
  .team-flag { width: 22px; height: 16px; object-fit: cover; border-radius: 2px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .team-flag-placeholder { width: 22px; height: 16px; background: var(--panel); border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .team-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
  .score-box { display: flex; align-items: center; gap: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); letter-spacing: 1px; }
  .score-sep { color: var(--muted); font-size: 14px; }

  /* CONTENT */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .view-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view-panel.active { display: flex; }

  /* STREAM VIEW */
  .match-hero { background: var(--panel2); border-bottom: 1px solid var(--border); padding: 0; flex-shrink: 0; }
  .hero-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; gap: 20px; }
  .hero-team { display: flex; align-items: center; gap: 12px; flex: 1; }
  .hero-team.right { flex-direction: row-reverse; }
  .hero-team-badge { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
  .hero-team-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--text); line-height: 1; }
  .hero-team-group { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hero-center { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .hero-score { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--text); letter-spacing: 4px; line-height: 1; }
  .hero-score-sep { color: var(--muted); }
  .hero-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .hero-venue { font-size: 10px; color: var(--muted); text-align: center; }
  .stream-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .stream-tabs { display: flex; align-items: center; gap: 0; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 20px; }
  .stream-tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .stream-tab.active { color: var(--text); border-color: var(--accent); }
  .stream-tab:hover:not(.active) { color: var(--text); }
  .stream-source-select { margin-left: auto; background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }
  .player-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .player-area iframe { width: 100%; height: 100%; border: 0; }
  .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-stream { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; text-align: center; padding: 40px; }
  .no-stream-icon { font-size: 48px; opacity: 0.3; }
  .no-stream-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .no-stream-sub { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.5; }

  .select-match { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 40px; }
  .select-match-icon { font-size: 64px; opacity: 0.15; }
  .select-match-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); opacity: 0.5; }

  /* GROUPS VIEW */
  .groups-view { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; align-content: start; }
  .groups-view::-webkit-scrollbar { width: 4px; }
  .groups-view::-webkit-scrollbar-thumb { background: var(--border); }
  .group-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .group-header { background: var(--panel2); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .group-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--gold); }
  .group-table { width: 100%; border-collapse: collapse; }
  .group-table th { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .group-table th:first-child { text-align: left; padding-left: 12px; }
  .group-table td { font-size: 12px; padding: 8px 8px; text-align: right; border-bottom: 1px solid rgba(30,45,69,0.4); }
  .group-table td:first-child { text-align: left; padding-left: 12px; }
  .group-table tr:last-child td { border-bottom: 0; }
  .group-table tr:hover td { background: rgba(255,255,255,0.02); }
  .team-rank-1 td:first-child, .team-rank-2 td:first-child { color: var(--green); font-weight: 600; }
  .pts-cell { font-weight: 700; color: var(--text); }

  /* SCHEDULE VIEW */
  .schedule-view { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .schedule-view::-webkit-scrollbar { width: 4px; }
  .schedule-view::-webkit-scrollbar-thumb { background: var(--border); }
  .schedule-day-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 12px 0 8px; border-top: 1px solid var(--border); margin-top: 8px; }
  .schedule-day-label:first-child { margin-top: 0; border-top: 0; }
  .schedule-match-row { display: flex; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; gap: 12px; }
  .schedule-match-row:hover { border-color: var(--accent); background: var(--panel2); }
  .sch-time { font-size: 11px; color: var(--muted); width: 70px; flex-shrink: 0; }
  .sch-teams { flex: 1; display: flex; align-items: center; gap: 10px; }
  .sch-team { display: flex; align-items: center; gap: 8px; flex: 1; }
  .sch-team-name { font-size: 13px; font-weight: 600; }
  .sch-vs { font-size: 11px; color: var(--muted); font-weight: 700; flex-shrink: 0; }
  .sch-score { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); flex-shrink: 0; min-width: 50px; text-align: center; }
  .sch-venue { font-size: 10px; color: var(--muted); width: 140px; flex-shrink: 0; text-align: right; }
  .sch-live-btn { padding: 4px 10px; background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--red); letter-spacing: 0.5px; cursor: pointer; flex-shrink: 0; }

  /* LOADING */
  .global-loading { position: fixed; inset: 0; z-index: 999; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.4s; }
  .global-loading.hidden { opacity: 0; pointer-events: none; }
  .wc-logo { font-size: 56px; animation: bounce 1s ease-in-out infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  .loading-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--gold); }
  .loading-sub { font-size: 12px; color: var(--muted); }
  .loading-bar { width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); animation: loadbar 1.5s ease-in-out infinite; }
  @keyframes loadbar { 0% { width: 0; } 60% { width: 100%; } 100% { width: 100%; opacity: 0; } }

  .toast { position: fixed; bottom: 20px; right: 20px; z-index: 200; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 12px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); transform: translateY(20px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) { .sidebar { width: 240px; min-width: 200px; } .hero-team-name { font-size: 18px; } .hero-score { font-size: 32px; } .topbar-center { display: none; } .sch-venue { display: none; } }
  @media (max-width: 560px) { .sidebar { display: none; } }
</style>
</head>
<body>

<div class="global-loading" id="globalLoading">
  <div class="wc-logo">⚽</div>
  <div class="loading-title">FIFA WORLD CUP 2026</div>
  <div class="loading-sub">Loading matches…</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="logo"><span>⚽</span> <span>WC</span>2026<span style="color:var(--muted);font-size:14px;font-weight:400;font-family:Inter,sans-serif;margin-left:4px"> LIVE</span></div>
  <div class="topbar-center">
    <div class="nav-tab active" onclick="switchView('stream')" id="tab-stream">▶ Watch Live</div>
    <div class="nav-tab" onclick="switchView('schedule')" id="tab-schedule">Schedule</div>
    <div class="nav-tab" onclick="switchView('groups')" id="tab-groups">Groups</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Matches</div>
      <div class="match-count" id="matchCount">—</div>
    </div>
    <div class="filter-bar" id="filterBar">
      <div class="filter-chip active" onclick="filterMatches('all',this)">All</div>
      <div class="filter-chip" onclick="filterMatches('live',this)">🔴 Live</div>
      <div class="filter-chip" onclick="filterMatches('today',this)">Today</div>
      <div class="filter-chip" onclick="filterMatches('upcoming',this)">Upcoming</div>
      <div class="filter-chip" onclick="filterMatches('finished',this)">Finished</div>
    </div>
    <div class="match-list" id="matchList">
      <div style="padding:30px 20px;text-align:center;color:var(--muted);font-size:12px;">Loading matches…</div>
    </div>
  </div>

  <div class="content">
    <div class="view-panel active" id="view-stream">
      <div id="streamContent" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="select-match" id="noMatchSelected">
          <div class="select-match-icon">🏟️</div>
          <div class="select-match-title">Select a match to watch</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px;">Choose any match from the left panel</div>
        </div>
      </div>
    </div>
    <div class="view-panel" id="view-schedule">
      <div class="schedule-view" id="scheduleView">
        <div style="text-align:center;color:var(--muted);padding:40px;">Loading schedule…</div>
      </div>
    </div>
    <div class="view-panel" id="view-groups">
      <div class="groups-view" id="groupsView">
        <div style="text-align:center;color:var(--muted);padding:40px;">Loading groups…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA SOURCE (GitHub raw — no auth, no geo-block) ──
const DATA_BASE = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026';
const SPORTSRC = 'https://api.sportsrc.org';

// ── STATE ──
let allMatches = [];   // normalized match objects
let allGroups = [];    // {name, teams:[]}
let groupStandings = {}; // group name → {teamName: {played,w,d,l,gf,ga,pts}}
let sportsrcMatches = [];
let currentFilter = 'all';
let activeMatchId = null;
let activeStreamSources = [];
let activeSourceIndex = 0;

// ── COUNTRY CODE MAP ──
const countryCodeMap = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czech Republic':'cz',
  'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','United States':'us','Paraguay':'py','Australia':'au',
  'Turkey':'tr','Turkiye':'tr','Türkiye':'tr',
  'Germany':'de','Curaçao':'cw','Curacao':'cw',"Ivory Coast":'ci',
  'Ecuador':'ec','Netherlands':'nl','Japan':'jp','Sweden':'se',
  'Tunisia':'tn','Belgium':'be','Egypt':'eg','Iran':'ir',
  'New Zealand':'nz','Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa',
  'Uruguay':'uy','France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa',
  'Czechia':'cz'
};

function getFlag(name) {
  const code = countryCodeMap[name];
  return code ? `https://flagcdn.com/w40/${code}.png` : null;
}

function teamFlagEl(name) {
  const src = getFlag(name);
  if (src) return `<img class="team-flag" src="${src}" alt="${name}" onerror="this.style.display='none'">`;
  return `<div class="team-flag-placeholder">${(name||'?').charAt(0)}</div>`;
}

// ── TIME UTILS ──
function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// Parse match UTC offset time string like "13:00 UTC-6" → UTC Date
function parseMatchDate(dateStr, timeStr) {
  try {
    const [time, tz] = timeStr.split(' ');
    const [h, m] = time.split(':').map(Number);
    const offset = parseInt(tz.replace('UTC','')) || 0;
    const d = new Date(dateStr + 'T00:00:00Z');
    d.setUTCHours(h - offset, m, 0, 0);
    return d;
  } catch { return new Date(dateStr); }
}

function isToday(matchDate) {
  const now = new Date();
  return matchDate.toDateString() === now.toDateString();
}

function isLive(m) {
  if (!m._date) return false;
  const now = Date.now();
  const start = m._date.getTime();
  return now >= start && now <= start + 110 * 60000; // ~110 min window
}

function isFinished(m) {
  if (!m._date) return false;
  return Date.now() > m._date.getTime() + 110 * 60000;
}

function fmtLocalTime(d) {
  return d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:true});
}

function fmtLocalDate(d) {
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric'});
}

// ── LOAD DATA ──
async function loadAllData() {
  const [matchRes, groupRes, srcRes] = await Promise.allSettled([
    fetch(`${DATA_BASE}/worldcup.json`).then(r => r.json()),
    fetch(`${DATA_BASE}/worldcup.groups.json`).then(r => r.json()),
    fetch(`${SPORTSRC}/?data=matches&category=football`).then(r => r.json())
  ]);

  if (matchRes.status === 'fulfilled') {
    const raw = matchRes.value.matches || [];
    allMatches = raw.map((m, i) => {
      const d = parseMatchDate(m.date, m.time || '00:00 UTC+0');
      const score = m.score?.ft;
      return {
        id: i,
        team1: m.team1 || 'TBD',
        team2: m.team2 || 'TBD',
        date: m.date,
        time: m.time,
        _date: d,
        _dateStr: fmtLocalDate(d),
        _timeStr: fmtLocalTime(d),
        round: m.round || '',
        group: m.group || '',
        ground: m.ground || '',
        num: m.num,
        score1: score ? score[0] : null,
        score2: score ? score[1] : null,
      };
    });
    computeStandings();
  }

  if (groupRes.status === 'fulfilled') {
    allGroups = groupRes.value.groups || [];
  }

  if (srcRes.status === 'fulfilled' && srcRes.value?.data) {
    sportsrcMatches = srcRes.value.data;
  }
}

// ── COMPUTE GROUP STANDINGS FROM RESULTS ──
function computeStandings() {
  groupStandings = {};
  allMatches.forEach(m => {
    if (!m.group || m.score1 === null) return;
    if (!groupStandings[m.group]) groupStandings[m.group] = {};
    const gs = groupStandings[m.group];
    [m.team1, m.team2].forEach(t => {
      if (!gs[t]) gs[t] = {played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    });
    const s1 = m.score1, s2 = m.score2;
    gs[m.team1].played++; gs[m.team2].played++;
    gs[m.team1].gf += s1; gs[m.team1].ga += s2;
    gs[m.team2].gf += s2; gs[m.team2].ga += s1;
    if (s1 > s2) { gs[m.team1].w++; gs[m.team1].pts+=3; gs[m.team2].l++; }
    else if (s1 < s2) { gs[m.team2].w++; gs[m.team2].pts+=3; gs[m.team1].l++; }
    else { gs[m.team1].d++; gs[m.team1].pts++; gs[m.team2].d++; gs[m.team2].pts++; }
  });
}

// ── FILTER ──
function getFiltered() {
  if (currentFilter === 'all') return allMatches;
  if (currentFilter === 'live') return allMatches.filter(m => isLive(m));
  if (currentFilter === 'today') return allMatches.filter(m => isToday(m._date));
  if (currentFilter === 'upcoming') return allMatches.filter(m => !isFinished(m) && !isLive(m));
  if (currentFilter === 'finished') return allMatches.filter(m => isFinished(m));
  return allMatches;
}

// ── RENDER MATCH LIST ──
function renderMatchList() {
  const list = document.getElementById('matchList');
  const filtered = getFiltered();
  document.getElementById('matchCount').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = '<div style="padding:30px 20px;text-align:center;color:var(--muted);font-size:12px;">No matches found</div>';
    return;
  }

  list.innerHTML = filtered.map(m => {
    const live = isLive(m), fin = isFinished(m);
    const active = activeMatchId === m.id;
    const statusClass = live ? 'status-live' : fin ? 'status-finished' : 'status-upcoming';
    const statusText = live ? '● Live' : fin ? 'FT' : 'Upcoming';
    const hs = m.score1 !== null ? m.score1 : '—';
    const as = m.score2 !== null ? m.score2 : '—';
    const roundLabel = m.group || m.round || '';
    return `
      <div class="match-item ${live?'live-match':''} ${active?'active':''}" onclick="selectMatch(${m.id})">
        <div class="match-meta">
          <span class="match-status ${statusClass}">${statusText}</span>
          <span class="match-time-label">${m._dateStr} ${m._timeStr}</span>
          <span class="match-round-label">${roundLabel}</span>
        </div>
        <div class="teams-row">
          <div class="team-entry">${teamFlagEl(m.team1)}<span class="team-name">${m.team1}</span></div>
          <div class="score-box"><span>${hs}</span><span class="score-sep">:</span><span>${as}</span></div>
          <div class="team-entry away">${teamFlagEl(m.team2)}<span class="team-name">${m.team2}</span></div>
        </div>
      </div>`;
  }).join('');
}

// ── SELECT MATCH ──
function selectMatch(id) {
  const m = allMatches.find(x => x.id === id);
  if (!m) return;
  activeMatchId = id;
  renderMatchList();
  switchView('stream');

  const live = isLive(m), fin = isFinished(m);
  const hs = m.score1 !== null ? m.score1 : '—';
  const as = m.score2 !== null ? m.score2 : '—';
  let statusHtml = '';
  if (live) statusHtml = `<span class="hero-status"><span class="live-dot"></span><span style="color:var(--red)">LIVE</span></span>`;
  else if (fin) statusHtml = `<span class="hero-status" style="color:var(--muted)">FULL TIME</span>`;
  else statusHtml = `<span class="hero-status" style="color:#60A5FA">${m._dateStr} · ${m._timeStr}</span>`;

  const flag1 = getFlag(m.team1), flag2 = getFlag(m.team2);
  const blankSvg = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect fill='%231A2235'/></svg>";

  document.getElementById('streamContent').innerHTML = `
    <div class="match-hero">
      <div class="hero-inner">
        <div class="hero-team">
          <img class="hero-team-badge" src="${flag1||blankSvg}" alt="${m.team1}" onerror="this.src='${blankSvg}'">
          <div><div class="hero-team-name">${m.team1}</div><div class="hero-team-group">${m.group||m.round||''}</div></div>
        </div>
        <div class="hero-center">
          <div class="hero-score"><span>${hs}</span><span class="hero-score-sep"> : </span><span>${as}</span></div>
          ${statusHtml}
          <div class="hero-venue">${m.ground}</div>
        </div>
        <div class="hero-team right">
          <img class="hero-team-badge" src="${flag2||blankSvg}" alt="${m.team2}" onerror="this.src='${blankSvg}'">
          <div style="text-align:right"><div class="hero-team-name">${m.team2}</div><div class="hero-team-group">${m.group||m.round||''}</div></div>
        </div>
      </div>
    </div>
    <div class="stream-wrapper">
      <div class="stream-tabs" id="streamTabs">
        <div class="stream-tab active" onclick="showStreamTab('player',this)">▶ Live Stream</div>
        <div class="stream-tab" onclick="showStreamTab('info',this)">ℹ Match Info</div>
        <select class="stream-source-select" id="sourceSelect" onchange="switchSource(this.value)" style="display:none"></select>
      </div>
      <div class="tab-content active" id="tab-player">
        <div class="player-area" id="playerArea">
          <div id="playerLoading" style="display:flex;flex-direction:column;align-items:center;gap:12px">
            <div class="spinner"></div>
            <div style="font-size:12px;color:var(--muted)">Finding stream…</div>
          </div>
        </div>
      </div>
      <div class="tab-content" id="tab-info">
        <div style="padding:24px;overflow-y:auto;flex:1">${renderMatchInfo(m)}</div>
      </div>
    </div>`;

  loadStream(m);
}

function renderMatchInfo(m) {
  const rows = [
    ['Competition','FIFA World Cup 2026™'],
    ['Stage', m.group || m.round || '—'],
    ['Date', m._dateStr + ' · ' + m._timeStr + ' (local)'],
    ['Venue', m.ground || '—'],
    ['Score', m.score1 !== null ? `${m.team1} ${m.score1} – ${m.score2} ${m.team2}` : 'Not played yet'],
  ];
  return `<div style="max-width:600px;margin:0 auto">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Match Details</div>
      <div style="padding:0 16px">
        ${rows.map(([l,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,45,69,0.4)"><span style="font-size:12px;color:var(--muted)">${l}</span><span style="font-size:12px;font-weight:600">${v}</span></div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── SPORTSRC MATCH FINDER ──
function findSportsrcMatch(t1, t2) {
  const n1 = t1.toLowerCase(), n2 = t2.toLowerCase();
  return sportsrcMatches.find(m => {
    const parts = (m.title||'').toLowerCase().split(' vs ');
    const a = parts[0]?.trim(), b = parts[1]?.trim();
    return (n1.includes(a)||a?.includes(n1)) && (n2.includes(b)||b?.includes(n2));
  }) || sportsrcMatches.find(m => {
    const t = (m.title||'').toLowerCase();
    return t.includes(n1) && t.includes(n2);
  });
}

// ── STREAM SOURCES ──
// Multiple stream providers — fallback chain
function buildStreamSources(t1, t2, srcId) {
  const slug = `${t1.toLowerCase().replace(/[\s&]+/g,'-')}-vs-${t2.toLowerCase().replace(/[\s&]+/g,'-')}`;
  const sources = [];
  if (srcId) {
    sources.push({ url: `https://api.sportsrc.org/player?id=${srcId}&category=football`, server: 'SportsRC Auto' });
    sources.push({ url: `https://embedsportsstream.site/player?id=${srcId}`, server: 'SportsRC 2' });
  }
  // Generic free stream providers (UAE-accessible, no VPN required)
  sources.push({ url: `https://socestream.pro/embed/${slug}`, server: 'SoceStream' });
  sources.push({ url: `https://streamtp.live/sport.php?id=${slug}`, server: 'StreamTP' });
  sources.push({ url: `https://totalsportek.to/match/${slug}`, server: 'TotalSportek' });
  return sources;
}

async function loadStream(m) {
  const playerArea = document.getElementById('playerArea');
  if (!playerArea) return;

  activeStreamSources = [];
  activeSourceIndex = 0;

  const live = isLive(m), fin = isFinished(m);

  if (fin) {
    playerArea.innerHTML = `<div class="no-stream"><div class="no-stream-icon">🏁</div><div class="no-stream-title">Match Ended</div><div class="no-stream-sub">Final: ${m.team1} ${m.score1} – ${m.score2} ${m.team2}</div></div>`;
    return;
  }

  if (!live) {
    playerArea.innerHTML = `<div class="no-stream"><div class="no-stream-icon">📅</div><div class="no-stream-title">Not Live Yet</div><div class="no-stream-sub">Stream available at kickoff.<br>${m._dateStr} · ${m._timeStr}</div><div style="margin-top:16px;padding:10px 20px;background:var(--green-dim);border:1px solid var(--green);border-radius:6px;font-size:11px;color:var(--green);font-weight:600">⏰ ${m._dateStr} — ${m._timeStr}</div></div>`;
    return;
  }

  // Try sportsrc detail first
  const srcMatch = findSportsrcMatch(m.team1, m.team2);
  let srcId = srcMatch?.id;

  if (srcId) {
    try {
      const res = await fetch(`${SPORTSRC}/?data=detail&category=football&id=${srcId}`);
      const data = await res.json();
      if (data?.data?.streams?.length) { activeStreamSources = data.data.streams; }
      else if (data?.data?.iframes?.length) { activeStreamSources = data.data.iframes; }
      else if (data?.data?.embed) { activeStreamSources = [{url: data.data.embed, server:'Auto'}]; }
    } catch {}
  }

  if (!activeStreamSources.length) {
    activeStreamSources = buildStreamSources(m.team1, m.team2, srcId);
  }

  const sel = document.getElementById('sourceSelect');
  if (sel) {
    sel.innerHTML = activeStreamSources.map((s,i) => `<option value="${i}">${s.server||`Stream ${i+1}`}</option>`).join('');
    sel.style.display = activeStreamSources.length > 1 ? 'block' : 'none';
  }

  loadIframe(0);
}

function loadIframe(idx) {
  const playerArea = document.getElementById('playerArea');
  if (!playerArea) return;
  const src = activeStreamSources[idx];
  if (!src) return;
  activeSourceIndex = idx;
  playerArea.innerHTML = `
    <div id="iframeLoader" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#000;z-index:1;pointer-events:none">
      <div class="spinner"></div>
      <div style="font-size:12px;color:var(--muted)">Loading ${src.server||'stream'}…</div>
    </div>
    <iframe src="${src.url||src}" allowfullscreen allow="autoplay;encrypted-media;fullscreen" referrerpolicy="no-referrer" scrolling="no"
      onload="document.getElementById('iframeLoader')?.remove()"
      onerror="tryNextSource()"></iframe>`;
}

function tryNextSource() {
  if (activeSourceIndex < activeStreamSources.length - 1) loadIframe(activeSourceIndex + 1);
}

function switchSource(idx) { loadIframe(parseInt(idx)); }

// ── TABS ──
function showStreamTab(name, el) {
  document.querySelectorAll('.stream-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`tab-${name}`)?.classList.add('active');
}

// ── VIEW SWITCH ──
function switchView(name) {
  document.querySelectorAll('.view-panel').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`view-${name}`)?.classList.add('active');
  document.getElementById(`tab-${name}`)?.classList.add('active');
  document.getElementById('sidebar').style.display = name === 'stream' ? '' : 'none';
}

// ── FILTER ──
function filterMatches(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMatchList();
}

// ── SCHEDULE ──
function renderSchedule() {
  const sv = document.getElementById('scheduleView');
  if (!sv) return;
  if (!allMatches.length) { sv.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">No data</div>'; return; }
  const byDate = {};
  allMatches.forEach(m => {
    const k = m._dateStr;
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(m);
  });
  sv.innerHTML = Object.entries(byDate).map(([date, matches]) => `
    <div class="schedule-day-label">${date}</div>
    ${matches.map(m => {
      const live = isLive(m), fin = isFinished(m);
      const hs = m.score1 !== null ? m.score1 : '', as = m.score2 !== null ? m.score2 : '';
      const scoreStr = (hs !== '' && as !== '') ? `${hs} : ${as}` : 'vs';
      return `<div class="schedule-match-row" onclick="selectMatch(${m.id})">
        <div class="sch-time">
          <div style="font-weight:700;color:${live?'var(--red)':fin?'var(--muted)':'var(--text)'}">${live?'LIVE':fin?'FT':m._timeStr}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${m.group||m.round||''}</div>
        </div>
        <div class="sch-teams">
          <div class="sch-team">${teamFlagEl(m.team1)}<span class="sch-team-name">${m.team1}</span></div>
          <div class="sch-score">${scoreStr}</div>
          <div class="sch-team" style="justify-content:flex-end"><span class="sch-team-name">${m.team2}</span>${teamFlagEl(m.team2)}</div>
        </div>
        <div class="sch-venue">${m.ground}</div>
        ${live ? `<div class="sch-live-btn">WATCH</div>` : ''}
      </div>`;
    }).join('')}`).join('');
}

// ── GROUPS ──
function renderGroups() {
  const gv = document.getElementById('groupsView');
  if (!gv) return;
  if (!allGroups.length) { gv.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">No group data</div>'; return; }

  gv.innerHTML = allGroups.map(g => {
    const gs = groupStandings[g.name] || {};
    const teams = (g.teams || []).map(name => {
      const s = gs[name] || {played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      return {...s, name, gd: s.gf - s.ga};
    }).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

    return `<div class="group-card">
      <div class="group-header">
        <div class="group-label">${g.name}</div>
        <div style="font-size:10px;color:var(--muted)">${teams.length} teams</div>
      </div>
      <table class="group-table">
        <thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody>${teams.map((t,i) => `
          <tr class="${i<2?'team-rank-'+(i+1):''}">
            <td style="display:flex;align-items:center;gap:7px">
              ${getFlag(t.name)?`<img src="${getFlag(t.name)}" style="width:18px;height:13px;object-fit:cover;border-radius:1px;border:1px solid rgba(255,255,255,0.08)" onerror="this.style.display='none'">`:'' }
              ${t.name}
            </td>
            <td>${t.played}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
            <td style="color:${t.gd>0?'var(--green)':t.gd<0?'var(--red)':'var(--muted)'}">${t.gd>0?'+':''}${t.gd}</td>
            <td class="pts-cell">${t.pts}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }).join('');
}

// ── REFRESH ──
async function refreshData() {
  showToast('Refreshing…');
  await loadAllData();
  renderMatchList(); renderSchedule(); renderGroups();
  showToast('✓ Refreshed');
}

// ── INIT ──
async function init() {
  try { await loadAllData(); } catch(e) { console.warn('Load error:', e); }
  renderMatchList(); renderSchedule(); renderGroups();
  document.getElementById('globalLoading').classList.add('hidden');
  setTimeout(() => document.getElementById('globalLoading')?.remove(), 500);

  // Auto-select first live match
  const live = allMatches.find(m => isLive(m));
  if (live) setTimeout(() => selectMatch(live.id), 300);
}

init();
</script>
</body>
